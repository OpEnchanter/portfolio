<!DOCTYPE html>
<html>
    <head>
        <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8584821565542895"
     crossorigin="anonymous"></script>
        <title>Tristan Greenhagen - Portfolio</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div class="header" id="header">
            <div class="header-content">
                <p class="intro_text">Hello, my name is...</p>
                <h1 class="name">Tristan Greenhagen</h1>
                
                <div class="chips">
                    <div class="chip" style="background: #0fabe2;">Python</div>
                    <div class="chip" style="background: #ef6d01;">Java</div>
                    <div class="chip" style="background: #ac4fe6;">C#</div>
                    <div class="chip" style="background: #4feca6;">C++</div>
                    <div class="chip" style="background: #00c573;">JS/TS</div>
                    <div class="chip" style="background: linear-gradient(45deg, #0fabe2, #ac4fe6, #4feca6);">Web</div>
                </div>
                <div class="links">
                    <a href="https://github.com/OpEnchanter" class="gh">GitHub</a>
                    <a href="https://wakatime.com/@OpEnchanter">WakaTime</a>
                    <a href="https://stats.fm/owofox" class="sfm">Stats.fm</a>
                </div>
                <div class="down" id="down_button"></div>
            </div>
        </div>
		<div class="body-content"></div>
        <script>
            var vx = 0;
            var vy = 0;

            var bx = 0;
            var by = 0;

            var mx = 0;
            var my = 0;

			// Dynamic page loading
			async function pageLoader() {
				fetch("/api/layout")
					.then((res) => { 
						return res.json(); 
					})
					.then((data) => { 
						console.log(data); 
						return data.page;
					})
					.then((page) => {
						page.forEach((elem) => {
							// Create card
							let card = document.createElement("div");
							card.className = "card";
                            
                            if (!navigator.userAgentData.mobile) {
                                let rect;

                                card.addEventListener('mouseenter', () => {
                                    // Calculate the bounding box once upon entry
                                    rect = card.getBoundingClientRect(); 
                                });

                                card.addEventListener('mousemove', (e) => {
                                    let mouseDiffNormalizedX = (e.clientX - (rect.left + rect.width / 2)) / (rect.width / 2);
                                    let mouseDiffNormalizedY = ((rect.top + rect.height / 2) - e.clientY) / (rect.height / 2);
                                    card.style.setProperty("--card-rotation-x", `${mouseDiffNormalizedX*15}deg`);
                                    card.style.setProperty("--card-rotation-y", `${mouseDiffNormalizedY*15}deg`);
                                    card.style.setProperty("--shadow-offset-x", `${mouseDiffNormalizedX * -15}px`);
                                    card.style.setProperty("--shadow-offset-y", `${mouseDiffNormalizedY * 15}px`);
                                });
                            }
                            

							{
								content = document.createElement("div");
								content.className = "content";

								{
									links = document.createElement("div");
									links.className = "links";

									{
										elem.links.forEach((link) => {
											linkElem = document.createElement("a");
											linkElem.innerText = link.name;
											linkElem.href = link.target;
											links.appendChild(linkElem);
										});

                                        elem.chips.forEach((chip) => {
											chipElem = document.createElement("div");
                                            chipElem.className = "chip";
											chipElem.innerText = chip.text;
                                            chipElem.style.backgroundColor = chip.color;
											links.appendChild(chipElem);
										});
									}

									content.appendChild(links);

									title = document.createElement("h1");
									title.innerText = elem.title;

									content.appendChild(title);

									description = document.createElement("div");
									description.className = "row";

									{
										text = document.createElement("p");
										text.innerText = elem.description;

										description.appendChild(text);
									}

									content.appendChild(description);

								}

								card.appendChild(content);

								thumbnail = document.createElement("img");
								thumbnail.src = elem.thumbnail;

								card.appendChild(thumbnail);
							}

							document.querySelector(".body-content").appendChild(card);
						});
					});
			}

			pageLoader();

			// Website functionality
            const down_button = document.getElementById("down_button");

            down_button.addEventListener('click', function() {
                window.scrollTo({
                    top: window.innerHeight + 30,
                    behavior: 'smooth'
                })
            })

            const header = document.getElementById("header");

            window.addEventListener('mousemove', function(e) {

                vx += (e.clientX - mx) * 0.01;
                vy += (e.clientY - my) * 0.01;

                mx = e.clientX;
                my = e.clientY;
            });

            function update_bg() {
                bx += vx;
                by += vy;

                bx = bx % window.innerWidth;
                by = by % window.innerHeight;

                vx*=0.99;
                vy*=0.99;

                header.style.setProperty('--bgBlurPosX', `${bx-window.innerWidth*2}px`);
                header.style.setProperty('--bgBlurPosY', `${by-window.innerHeight*2+window.scrollY}px`);

                if (navigator.userAgentData.mobile) {
                    document.querySelectorAll(".card").forEach(card => {
                        let box = card.getBoundingClientRect();
                        let centeredAmount = 1 - (Math.abs((box.y - (window.innerHeight/2)) * 2) / window.innerHeight/2);
                        let xOff = 1 - (Math.abs(((box.y - (window.innerHeight/2)) ** 2) / 20)  / window.innerHeight/2);
                        card.style.transform = `scale(${centeredAmount}) translateX(${xOff*50}px)`;
                        console.log(centeredAmount);
                    });
                }
                

                // header.style.backgroundPositionX = `${bx-window.innerWidth*2}px`;
                // header.style.backgroundPositionY = `${by-window.innerHeight*2+window.scrollY}px`;
            }

            setInterval(update_bg, 1)

        </script>
    </body>
</html>

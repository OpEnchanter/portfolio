<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body style="height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center;">
        <div class="header" id="header">
            <div class="header-content">
                <h1 class="name">(ʘ ʖ̯ ʘ)</h1>
                <p class="about">Hi! I'm the man at the end of the website!</p>
            </div>
        </div>
        <script>
            var vx = 0;
            var vy = 0;

            var bx = 0;
            var by = 0;

            var mx = 0;
            var my = 0;
            const header = document.getElementById("header");

            window.addEventListener('mousemove', function(e) {

                vx += (e.clientX - mx) * 0.01;
                vy += (e.clientY - my) * 0.01;

                mx = e.clientX;
                my = e.clientY;
            });

            function update_bg() {
                bx += vx;
                by += vy;

                bx = bx % window.innerWidth;
                by = by % window.innerHeight;

                vx*=0.99;
                vy*=0.99;

                header.style.setProperty('--bgBlurPosX', `${bx-window.innerWidth*2}px`);
                header.style.setProperty('--bgBlurPosY', `${by-window.innerHeight*2+window.scrollY}px`);
            }

            setInterval(update_bg, 1)
        </script>
    </body>
</html>
